<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pravi.com Visitor Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #ff6b6b,
        #feca57,
        #48dbfb,
        #5f27cd
    );
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:420px;
    background:#ffffff;
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    font-size:36px;
    font-weight:bold;
    margin-bottom:5px;
    background:linear-gradient(90deg,#ff6b6b,#5f27cd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    border-color:#5f27cd;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(
        90deg,
        #ff6b6b,
        #feca57,
        #48dbfb,
        #5f27cd
    );
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#msg{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">Pravi.com</div>
    <div class="subtitle">Visitor Registration Portal</div>

    <input id="name" placeholder="Name">

    <input id="email" placeholder="Email">

    <input id="phone" placeholder="Phone">

    <input id="purpose" placeholder="Purpose">

    <button onclick="registerVisitor()">
        Register Visitor
    </button>

    <p id="msg"></p>

</div>

<script>

async function registerVisitor(){

    document.getElementById("msg").innerHTML = "Submitting...";

    const response = await fetch(
    "https://rphi5did5g.execute-api.ap-south-1.amazonaws.com/prod/visitor",
    {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name:document.getElementById("name").value,
            email:document.getElementById("email").value,
            phone:document.getElementById("phone").value,
            purpose:document.getElementById("purpose").value
        })
    });

    const data = await response.json();

    document.getElementById("msg").innerHTML = data.message;
}

</script>

</body>
</html>
